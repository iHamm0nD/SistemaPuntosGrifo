<div class="login-container">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <img src="assets/images/logoperricholi.png" alt="Logo La Perricholi" class="login-logo-img">
        </div>
        <h2 class="login-title">Iniciar Sesión</h2>
        <p class="login-subtitle">Accede al Sistema</p>
      </div>

      <form class="login-form" (ngSubmit)="login()">
        <div class="form-group">
          <label for="username" class="form-label">
            <i class="pi pi-user"></i>
            Usuario
          </label>
          <input id="username" type="text" class="form-input" [(ngModel)]="username" name="username"
            placeholder="Introduce tu usuario" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">
            <i class="pi pi-lock"></i>
            Contraseña
          </label>
          <input id="password" type="password" class="form-input" [(ngModel)]="password" name="password"
            placeholder="Introduce tu contraseña" required>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary" [disabled]="!username || !password">
            <i class="pi pi-sign-in"></i>
            Ingresar al Sistema
          </button>

          <button type="button" class="btn btn-secondary" routerLink="/index">
            <i class="pi pi-home"></i>
            Volver al Inicio
          </button>
        </div>

        <p-message *ngIf="error" severity="error" [text]="error" class="error-message">
        </p-message>
      </form>

      <div class="login-footer">
        <p class="footer-text">Grifo La Perricholi &copy; 2026</p>
      </div>
    </div>
  </div>
</div>
