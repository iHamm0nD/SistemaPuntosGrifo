<!-- Header -->
<p-toolbar styleClass="custom-header">
  <div class="p-toolbar-group-left flex align-items-center gap-3">
    <div class="logo-container">
      <i class="pi pi-bolt"></i>
    </div>
    <span class="logo-text">GrifoPuntos</span>
  </div>
  <div class="p-toolbar-group-right flex align-items-center gap-3">
    <p-button 
      label="Acceder al Sistema" 
      styleClass="header-btn-primary"
      [routerLink]="['/login']">
    </p-button>
  </div>
</p-toolbar>

<!-- Hero Section -->
<div class="hero-section">
  <div class="hero-background"></div>
  <div class="hero-content">

    <h1 class="hero-title">
      Sistema de Acumulación de <span class="hero-highlight">Puntos</span>
    </h1>
    
    <p class="hero-description">
      Controla y gestiona los puntos acumulados por los clientes en cada compra de combustible en tu grifo. Premia a tus mejores clientes.
    </p>

    <div class="hero-buttons">
      <p-button 
        label="Ingresar al Sistema" 
        icon="pi pi-sign-in"
        styleClass="hero-btn-primary"
        [routerLink]="['/login']">
      </p-button>

    </div>
  </div>
</div>
